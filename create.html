<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="create.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2356CCF2'/%3E%3Cstop offset='100%25' stop-color='%23F299C1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='url(%23bg)'/%3E%3Crect x='14' y='12' width='36' height='40' rx='8' fill='white' fill-opacity='0.96'/%3E%3Crect x='20' y='20' width='16' height='4' rx='2' fill='%235A67D8'/%3E%3Crect x='20' y='28' width='24' height='4' rx='2' fill='%2390CDF4'/%3E%3Crect x='20' y='36' width='20' height='4' rx='2' fill='%23F6AD55'/%3E%3Ccircle cx='44' cy='18' r='7' fill='%23FFE066'/%3E%3Cpath d='M44 14.5l1.1 2.2 2.4.4-1.7 1.7.4 2.4-2.2-1.2-2.2 1.2.4-2.4-1.7-1.7 2.4-.4z' fill='%23F2994A'/%3E%3C/svg%3E">
</head>

<body>
    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="progress.html">PROGRESS</a></li>
            <li><a href="level.html">LEVEL</a></li>
            <li><a href="timetable.html">TIMETABLE</a></li>
            <li><a href="about.html">ABOUT</a></li>
        </ul>
    </nav>

    <form class="form">
        <a class="close-btn" href="index.html" aria-label="Close">×</a>
        <h2>Create Your Study Plan</h2>

        <div class="field">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" required>
        </div>

        <div class="subjects-header">
            <label>Subjects and Topics</label>
            <div class="header-actions">
                <button type="reset" class="button clear-btn">Clear All</button>
                <button type="button" class="button add-btn">Add Subject</button>
            </div>
        </div>
        <div class="subjects" aria-live="polite">
            <div class="subject-group" data-required="true">
                <input type="text" name="subjects[]" placeholder="Subject" required>
                <input type="text" name="topics[]" placeholder="Topic" required>
                <button type="button" class="remove-btn" aria-label="Remove subject">Remove</button>
            </div>
        </div>
        <p class="hint">Add more rows as needed, like a daily planner.</p>

        <button type="submit" class="button primary">Save Plan</button>
    </form>

    <template id="subject-template">
        <div class="subject-group">
            <input type="text" name="subjects[]" placeholder="Subject">
            <input type="text" name="topics[]" placeholder="Topic">
            <button type="button" class="remove-btn" aria-label="Remove subject">Remove</button>
        </div>
    </template>


    <script src="create.js"></script>
</body>

</html>
