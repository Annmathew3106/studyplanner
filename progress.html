<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="progress.html" class="active">PROGRESS</a></li>
            <li><a href="level.html">LEVEL</a></li>
            <li><a href="timetable.html">TIMETABLE</a></li>
            <li><a href="about.html">ABOUT</a></li>

        </ul>
    </nav>


    <div class="content">
        <div class="header-row">
            <h1><span class="page-icon" aria-hidden="true">&#128200;</span>Progress</h1>
        </div>
        <h2><span class="subtitle-icon" aria-hidden="true">&#10022;</span>Track your study consistency</h2>

        <div id="panel-current" class="progress-card">
            <div class="progress-header">
                <div class="progress-copy">
                    <h3><span class="section-icon" aria-hidden="true">&#9684;</span>Your Progress</h3>
                    <p class="progress-subtitle">Shows how many tasks you completed over time.</p>
                </div>
                <div class="select-wrap">
                    <label for="range" class="sr-only">Range</label>
                    <select id="range">
                        <option value="today">Today</option>
                        <option value="daily">Daily (28 days around today)</option>
                        <option value="weekly">Weekly (8 weeks around today)</option>
                        <option value="monthly">Monthly (12 months around today)</option>
                    </select>
                </div>
            </div>

            <div class="chart-row">
                <div id="chart" class="line-chart" aria-live="polite"></div>
                <div id="week-legend" class="week-legend" aria-live="polite" hidden></div>
            </div>
        </div>

    </div>

    <script src="progress.js"></script>
</body>

</html>
